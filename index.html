<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetable Consumption Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🥬 Weekly Veggie Tracker</h1>
            <div class="week-selector">
                <button id="prevWeek">&lt;</button>
                <span id="currentWeekDisplay">Week 1</span>
                <button id="nextWeek">&gt;</button>
            </div>
        </header>

        <main id="vegetableContainer">
            <!-- Vegetables will be loaded here -->
        </main>

        <footer class="controls">
            <div class="btn-group">
                <button id="saveBtn" class="btn-primary">Save Week</button>
                <button id="resetWeekBtn" class="btn-secondary">Reset Week</button>
            </div>
            
            <button id="exportBtn" class="btn-export">📥 Export All Data to CSV</button>
            
            <label for="fileInput" class="btn-import-label">
                📂 Import Data from CSV
            </label>
            <input type="file" id="fileInput" accept=".csv">

            <div id="statusMsg" class="status-msg"></div>
        </footer>
    </div>

    <!-- External Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
