<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetable Consumption Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🥬 Weekly Veggie Tracker</h1>
            <div class="week-selector">
                <button id="prevWeek">&lt;</button>
                <span id="currentWeekDisplay">Week 1</span>
                <button id="nextWeek">&gt;</button>
            </div>
        </header>

        <!-- Main Tracking View -->
        <main id="vegetableContainer">
            <!-- Vegetables will be loaded here -->
        </main>

        <!-- NEW: Dashboard Container (Hidden by default) -->
        <section id="dashboard" class="dashboard hidden">
            <h2>📊 Your Progress</h2>
            
            <!-- Overall Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalWeeksTracked">0</div>
                    <div class="stat-label">Weeks Tracked</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalVeggieCount">0</div>
                    <div class="stat-label">Total Selections</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completionRate">0%</div>
                    <div class="stat-label">Avg Completion</div>
                </div>
            </div>

            <!-- Current Week Progress Bar -->
            <div class="progress-section">
                <h3>This Week's Progress</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="weeklyProgressFill"></div>
                </div>
                <div class="progress-text">
                    <span id="selectedCount">0</span> / <span id="totalCount">0</span> vegetables selected
                </div>
            </div>

            <!-- Category Distribution Chart -->
            <div class="chart-section">
                <h3>Vegetable Categories</h3>
                <div id="categoryBars"></div>
            </div>

        <!-- Top 5 Most Eaten -->
            <div class="chart-section">
                <h3>Top 5 Most Consumed</h3>
                <div id="topVegetables"></div>
            </div>

        <!-- NEW: Least Consumed Section -->
            <div class="chart-section" style="border-top: 1px solid #e2e8f0; padding-top: 25px; margin-top: 25px;">
                <h3 style="color: #ef476f;">🥬 Least Consumed (Try adding these!)</h3>
                <div id="leastVegetables"></div>
            </div>
        </section>

        <footer class="controls">
            <!-- NEW: View Dashboard Button -->
            <button id="viewDashboardBtn" class="btn-secondary">📊 View Dashboard</button>
            
            <div class="btn-group">
                <button id="saveBtn" class="btn-primary">Save Week</button>
                <button id="resetWeekBtn" class="btn-secondary">Reset Week</button>
            </div>
            
            <button id="exportBtn" class="btn-export">📥 Export All Data to CSV</button>
            
            <label for="fileInput" class="btn-import-label">
                📂 Import Data from CSV
            </label>
            <input type="file" id="fileInput" accept=".csv">

            <div id="statusMsg" class="status-msg"></div>
        </footer>
    </div>

    <!-- External Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
