<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetable Consumption Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🥬 Weekly Veggie Tracker</h1>
            <div class="week-selector">
                <button id="prevWeek">&lt;</button>
                <span id="currentWeekDisplay">Week 1</span>
                <button id="nextWeek">&gt;</button>
            </div>
        </header>

        <main id="vegetableContainer">
            <!-- Vegetables will be loaded here -->
        </main>

        <footer class="controls">
            <button id="saveBtn" class="btn-primary">Save Progress</button>
            <button id="resetWeekBtn" class="btn-secondary">Reset Week</button>
            <span id="statusMsg"></span>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
